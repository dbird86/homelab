services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped

    env_file:
      - /opt/docker/env/network.env
      - /opt/docker/env/host.env      

    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"

    volumes:
      - ${DOCKER_APPDATA}pihole:/etc/pihole
      - ${DOCKER_APPDATA}pihole/etc-dnsmasq.d:/etc/dnsmasq.d

    dns:
      - 127.0.0.1
      - 1.1.1.1

    depends_on:
      - unbound

  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped

    volumes:
      - /opt/docker/data/unbound:/opt/unbound/etc/unbound