---
- name: Install NFS client packages
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Ensure base mount directory exists
  ansible.builtin.file:
    path: /mnt/data
    state: directory
    mode: "0755"

- name: Check existing mount directories
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ nfs.mounts | default([]) }}"
  register: mount_dirs

- name: Create required NFS mount directories if missing
  ansible.builtin.file:
    path: "{{ item.item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ mount_dirs.results }}"
  when: not item.stat.exists

- name: Mount required NFS shares
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ nfs.server }}:{{ item.src }}"
    fstype: nfs
    opts: "{{ item.opts | default('defaults,_netdev') }}"
    state: mounted
  loop: "{{ nfs.mounts | default([]) }}"

