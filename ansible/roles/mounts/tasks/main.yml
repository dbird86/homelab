- name: Create Grafana data directory
  ansible.builtin.file:
    path: /opt/docker/grafana/data
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  when: "'apps' in group_names"    

- name: Create Prometheus config directory
  file:
    path: /opt/docker/prometheus
    state: directory
    mode: '0755'

- name: Create Prometheus data directory
  ansible.builtin.file:
    path: /opt/docker/prometheus/data
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"    

- name: Install Prometheus config
  copy:
    dest: /opt/docker/prometheus/prometheus.yml
    content: |
      global:
        scrape_interval: 15s

      scrape_configs:
        - job_name: cadvisor
          static_configs:
            - targets:
                - cadvisor:8080
    mode: '0644'
  when: "'apps' in group_names"    