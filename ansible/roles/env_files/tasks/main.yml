- name: Ensure env directory exists
  file:
    path: "{{ docker_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create per-host Docker env file
  ansible.builtin.copy:
    dest: /opt/docker/env/host.env
    mode: '0644'
    content: |
      {% for key, value in docker_env.items() %}
      {{ key }}={{ value }}
      {% endfor %}

- name: Write stack env files
  copy:
    dest: "{{ docker_env_dir }}/{{ item.key }}.env"
    owner: root
    group: root
    mode: "0640"
    content: |
      {% for key, value in item.value.items() %}
      {{ key }}={{ value }}
      {% endfor %}
  loop: "{{ env_files | default({}) | dict2items }}"
  no_log: true